name: Standardize site header

on:
  push:
    branches: [header-consistency]
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  standardize:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: header-consistency
          fetch-depth: 0
      - name: Apply and audit canonical header
        run: python3 tools/standardize_headers.py
      - name: Commit standardized headers
        run: |
          rm -f .github/workflows/standardize-site-header.yml tools/standardize_headers.py
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet && exit 0
          git commit -m "Standardize site header across all pages"
          git push origin HEAD:header-consistency

name: Audit page connectivity

on:
  push:
    branches:
      - audit-page-connectivity

permissions:
  contents: write

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - name: Check out audit branch
        uses: actions/checkout@v4
        with:
          ref: audit-page-connectivity
          fetch-depth: 0

      - name: Build internal page graph
        shell: python
        run: |
          from __future__ import annotations

          from collections import defaultdict, deque
          from html.parser import HTMLParser
          from pathlib import Path, PurePosixPath
          from urllib.parse import urlsplit
          import html
          import posixpath
          import re

          ROOT = Path('.')
          REPORT = ROOT / 'SITE-CONNECTIVITY-AUDIT.txt'
          HTML_SUFFIX = '.html'
          EXCLUDED_DIRS = {'.git', '.github'}

          def included(path: Path) -> bool:
              return not any(part in EXCLUDED_DIRS for part in path.parts)

          html_paths = sorted(
              p for p in ROOT.rglob('*.html')
              if included(p)
          )
          html_files = {p.as_posix().lstrip('./') for p in html_paths}
          all_files = {
              p.as_posix().lstrip('./')
              for p in ROOT.rglob('*')
              if p.is_file() and included(p)
          }

          class PageParser(HTMLParser):
              def __init__(self) -> None:
                  super().__init__(convert_charrefs=True)
                  self.links: list[tuple[str, str]] = []
                  self.scripts: list[str] = []
                  self.ids: set[str] = set()
                  self._in_script = False
                  self.inline_scripts: list[str] = []

              def handle_starttag(self, tag: str, attrs: list[tuple[str, str | None]]) -> None:
                  values = {key.lower(): value for key, value in attrs if value is not None}
                  if values.get('id'):
                      self.ids.add(values['id'])
                  if values.get('name'):
                      self.ids.add(values['name'])
                  if tag.lower() == 'a' and values.get('href'):
                      self.links.append(('a', values['href']))
                  elif tag.lower() == 'form' and values.get('action'):
                      self.links.append(('form', values['action']))
                  elif tag.lower() == 'script':
                      self._in_script = True
                      if values.get('src'):
                          self.scripts.append(values['src'])

              def handle_endtag(self, tag: str) -> None:
                  if tag.lower() == 'script':
                      self._in_script = False

              def handle_data(self, data: str) -> None:
                  if self._in_script and data.strip():
                      self.inline_scripts.append(data)

          def is_external(raw: str) -> bool:
              value = raw.strip()
              if not value or value.startswith(('#', '//')):
                  return value.startswith('//')
              parts = urlsplit(value)
              return parts.scheme.lower() in {
                  'http', 'https', 'mailto', 'tel', 'sms', 'javascript', 'data', 'ftp'
              }

          def normalize_path(source: str, raw: str) -> tuple[str | None, str | None]:
              value = html.unescape(raw.strip())
              if not value or value.startswith('#') or is_external(value):
                  return None, None
              parts = urlsplit(value)
              raw_path = parts.path
              fragment = parts.fragment or None
              if not raw_path:
                  return source, fragment
              if raw_path.startswith('/'):
                  target = posixpath.normpath(raw_path.lstrip('/'))
              else:
                  target = posixpath.normpath(
                      posixpath.join(str(PurePosixPath(source).parent), raw_path)
                  )
              if target in {'.', ''}:
                  target = source
              if raw_path.endswith('/'):
                  target = posixpath.join(target, 'index.html')
              return target, fragment

          def resolve_page(target: str | None) -> str | None:
              if target is None:
                  return None
              candidates = [target]
              suffix = PurePosixPath(target).suffix
              if not suffix:
                  candidates.extend([f'{target}.html', posixpath.join(target, 'index.html')])
              for candidate in candidates:
                  if candidate in html_files:
                      return candidate
              return None

          html_string_pattern = re.compile(
              r'''(?P<quote>["'])(?P<url>[^"'\s<>]+?\.html(?:[?#][^"'<>\s]*)?)(?P=quote)''',
              re.IGNORECASE,
          )

          parsed: dict[str, PageParser] = {}
          source_text: dict[str, str] = {}
          outgoing: dict[str, set[str]] = {page: set() for page in html_files}
          inbound: dict[str, set[str]] = {page: set() for page in html_files}
          route_evidence: dict[tuple[str, str], set[str]] = defaultdict(set)
          broken_page_links: list[tuple[str, str, str]] = []
          missing_assets: list[tuple[str, str, str]] = []
          missing_fragments: list[tuple[str, str, str]] = []

          for path in html_paths:
              source = path.as_posix().lstrip('./')
              text = path.read_text(encoding='utf-8', errors='replace')
              source_text[source] = text
              parser = PageParser()
              parser.feed(text)
              parsed[source] = parser

          # Direct links in HTML.
          for source, parser in parsed.items():
              for kind, raw in parser.links:
                  target, fragment = normalize_path(source, raw)
                  if target is None:
                      continue
                  page = resolve_page(target)
                  if page:
                      outgoing[source].add(page)
                      inbound[page].add(source)
                      route_evidence[(source, page)].add(f'{kind}: {raw}')
                      if fragment and fragment not in parsed[page].ids:
                          missing_fragments.append((source, raw, page))
                  else:
                      suffix = PurePosixPath(target).suffix.lower()
                      if suffix in {'', '.html', '.htm'}:
                          broken_page_links.append((source, raw, target))
                      elif target not in all_files:
                          missing_assets.append((source, raw, target))

          # Links created by scripts loaded on each page, plus inline JavaScript.
          script_cache: dict[str, str] = {}
          for source, parser in parsed.items():
              script_texts = list(parser.inline_scripts)
              for raw_script in parser.scripts:
                  target, _ = normalize_path(source, raw_script)
                  if target is None:
                      continue
                  if target not in all_files:
                      missing_assets.append((source, raw_script, target))
                      continue
                  if target not in script_cache:
                      script_cache[target] = (ROOT / target).read_text(
                          encoding='utf-8', errors='replace'
                      )
                  script_texts.append(script_cache[target])

              for script_text in script_texts:
                  for match in html_string_pattern.finditer(script_text):
                      raw = match.group('url')
                      target, _ = normalize_path(source, raw)
                      page = resolve_page(target)
                      if page:
                          outgoing[source].add(page)
                          inbound[page].add(source)
                          route_evidence[(source, page)].add(f'script: {raw}')
                      elif target:
                          broken_page_links.append((source, raw, target))

          # Reachability from the actual homepage.
          start = 'index.html'
          reachable: set[str] = set()
          queue: deque[str] = deque([start]) if start in html_files else deque()
          while queue:
              page = queue.popleft()
              if page in reachable:
                  continue
              reachable.add(page)
              for target in sorted(outgoing.get(page, set())):
                  if target not in reachable:
                      queue.append(target)

          expected_special = {'404.html'} & html_files
          orphaned = sorted(html_files - reachable - expected_special)
          no_inbound = sorted(
              page for page in html_files
              if page not in {start, *expected_special} and not inbound[page]
          )
          one_inbound = sorted(
              page for page in html_files
              if page not in {start, *expected_special} and len(inbound[page]) == 1
          )

          # Deduplicate findings.
          broken_page_links = sorted(set(broken_page_links))
          missing_assets = sorted(set(missing_assets))
          missing_fragments = sorted(set(missing_fragments))

          lines: list[str] = []
          lines.append('KINGSHIP CHRISTIAN CENTRE — SITE CONNECTIVITY AUDIT')
          lines.append('=' * 62)
          lines.append('')
          lines.append(f'HTML pages found: {len(html_files)}')
          lines.append(f'Pages reachable from index.html: {len(reachable)}')
          lines.append(f'Expected special pages excluded from reachability: {len(expected_special)}')
          lines.append(f'Orphaned pages: {len(orphaned)}')
          lines.append(f'Pages with zero inbound links: {len(no_inbound)}')
          lines.append(f'Pages with only one inbound source: {len(one_inbound)}')
          lines.append(f'Broken internal page links: {len(broken_page_links)}')
          lines.append(f'Missing internal assets/scripts: {len(missing_assets)}')
          lines.append(f'Links to missing anchors: {len(missing_fragments)}')
          lines.append('')

          lines.append('REACHABLE PAGES')
          lines.append('-' * 62)
          for page in sorted(reachable):
              sources = ', '.join(sorted(inbound[page])) or 'homepage entry point'
              lines.append(f'[OK] {page}  <-  {sources}')
          lines.append('')

          lines.append('EXPECTED SPECIAL PAGES')
          lines.append('-' * 62)
          if expected_special:
              for page in sorted(expected_special):
                  lines.append(f'[SPECIAL] {page} — served by the host for invalid URLs')
          else:
              lines.append('None')
          lines.append('')

          lines.append('ORPHANED / UNREACHABLE FROM HOMEPAGE')
          lines.append('-' * 62)
          if orphaned:
              for page in orphaned:
                  sources = ', '.join(sorted(inbound[page])) or 'no inbound links anywhere'
                  lines.append(f'[ORPHAN] {page}  <-  {sources}')
          else:
              lines.append('None')
          lines.append('')

          lines.append('ZERO-INBOUND PAGES')
          lines.append('-' * 62)
          if no_inbound:
              for page in no_inbound:
                  lines.append(f'[NO INBOUND] {page}')
          else:
              lines.append('None')
          lines.append('')

          lines.append('PAGES WITH ONLY ONE INBOUND SOURCE')
          lines.append('-' * 62)
          if one_inbound:
              for page in one_inbound:
                  source = next(iter(inbound[page]))
                  evidence = '; '.join(sorted(route_evidence[(source, page)]))
                  lines.append(f'[ONE ROUTE] {page}  <-  {source} ({evidence})')
          else:
              lines.append('None')
          lines.append('')

          lines.append('BROKEN INTERNAL PAGE LINKS')
          lines.append('-' * 62)
          if broken_page_links:
              for source, raw, resolved in broken_page_links:
                  lines.append(f'[BROKEN PAGE] {source}: {raw} -> {resolved}')
          else:
              lines.append('None')
          lines.append('')

          lines.append('MISSING INTERNAL ASSETS OR SCRIPTS')
          lines.append('-' * 62)
          if missing_assets:
              for source, raw, resolved in missing_assets:
                  lines.append(f'[MISSING FILE] {source}: {raw} -> {resolved}')
          else:
              lines.append('None')
          lines.append('')

          lines.append('LINKS TO MISSING ANCHORS')
          lines.append('-' * 62)
          if missing_fragments:
              for source, raw, target in missing_fragments:
                  lines.append(f'[MISSING ANCHOR] {source}: {raw} on {target}')
          else:
              lines.append('None')
          lines.append('')

          lines.append('FULL PAGE INBOUND SUMMARY')
          lines.append('-' * 62)
          for page in sorted(html_files):
              sources = sorted(inbound[page])
              lines.append(f'{page}: {len(sources)} inbound')
              for source in sources:
                  evidence = '; '.join(sorted(route_evidence[(source, page)]))
                  lines.append(f'  - {source}: {evidence}')

          REPORT.write_text('\n'.join(lines) + '\n', encoding='utf-8')
          print('\n'.join(lines[:80]))
          print(f'\nFull report written to {REPORT}')

      - name: Commit audit report and remove workflow
        shell: bash
        run: |
          rm -f .github/workflows/audit-page-connectivity.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Add site connectivity audit report"
          git push origin HEAD:audit-page-connectivity

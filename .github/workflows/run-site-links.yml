name: Run final site-link validation

on:
  push:
    branches: [audit-page-connectivity]
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: audit-page-connectivity
          fetch-depth: 0
      - name: Repair and validate links
        run: python3 tools/finalize_site_links.py
      - name: Commit verified result
        run: |
          rm -f .github/workflows/run-site-links.yml tools/finalize_site_links.py CONNECTIVITY-REPORT.txt
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Complete zero-orphan site navigation"
          git push origin HEAD:audit-page-connectivity

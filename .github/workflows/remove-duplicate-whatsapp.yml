name: Remove duplicate legacy WhatsApp button

on:
  push:
    branches:
      - agent/remove-duplicate-whatsapp

permissions:
  contents: write

jobs:
  clean:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Remove legacy WA text buttons
        shell: python
        run: |
          from pathlib import Path
          import re

          pattern = re.compile(r'\s*<a\s+class="floating-whatsapp"[^>]*>\s*WA\s*</a>', re.I)
          changed = []
          removed = 0

          for path in Path('.').rglob('*.html'):
              original = path.read_text(encoding='utf-8')
              updated, count = pattern.subn('', original)
              if count:
                  path.write_text(updated, encoding='utf-8')
                  changed.append(str(path))
                  removed += count

          print(f'Removed {removed} legacy button(s) from {len(changed)} file(s).')
          for path in changed:
              print(path)

      - name: Remove one-time workflow and commit
        shell: bash
        run: |
          rm -f .github/workflows/remove-duplicate-whatsapp.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No duplicate legacy buttons found."
            exit 0
          fi
          git commit -m "Remove duplicate legacy WhatsApp buttons"
          git push origin HEAD:agent/remove-duplicate-whatsapp

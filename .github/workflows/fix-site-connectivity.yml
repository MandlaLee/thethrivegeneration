name: Repair and verify site connectivity

on:
  push:
    branches: [audit-page-connectivity]
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  repair:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: audit-page-connectivity
          fetch-depth: 0

      - name: Connect all public pages
        shell: python
        run: |
          from pathlib import Path
          root = Path('.')

          old_explore = '<div><h3>Explore</h3><a href="about.html">About</a><a href="events.html">Events</a><a href="auditions.html">Auditions</a><a href="contact.html">Contact</a><a href="give.html">Give</a></div>'
          new_explore = '<div><h3>Explore</h3><a href="about.html">About</a><a href="events.html">Events</a><a href="auditions.html">Auditions</a><a href="contact.html">Contact</a><a href="give.html">Give</a><a href="new-here.html">New Here</a><a href="media.html">Media</a></div>'
          old_ministries = '<div><h3>Ministries</h3><a href="unithrive.html">UniThrive</a><a href="kingship-worship.html">Kingship Worship</a><a href="thrive-in-two.html">Thrive In Two</a><a href="prayer-ministry.html">The Prayer Ministry</a></div>'
          new_ministries = '<div><h3>Ministries</h3><a href="unithrive.html">UniThrive</a><a href="kingship-worship.html">Kingship Worship</a><a href="choir-members.html">Choir Members</a><a href="thrive-in-two.html">Thrive In Two</a><a href="prayer-ministry.html">The Prayer Ministry</a></div>'
          old_bottom = '<div class="container footer-bottom"><p>© 2026 Kingship Christian Centre. All rights reserved.</p><p>Website designed &amp; developed by <a href="https://mandlalee.co.za" rel="noopener" target="_blank">MandlaLee</a>.</p></div>'
          new_bottom = '<div class="container footer-bottom"><p>© 2026 Kingship Christian Centre. All rights reserved.</p><p class="footer-legal"><a href="privacy-policy.html">Privacy Policy</a><span aria-hidden="true">·</span><a href="terms.html">Terms</a></p><p>Website designed &amp; developed by <a href="https://mandlalee.co.za" rel="noopener" target="_blank">MandlaLee</a>.</p></div>'

          for path in root.glob('*.html'):
              text = path.read_text(encoding='utf-8')
              text = text.replace(old_explore, new_explore)
              text = text.replace(old_ministries, new_ministries)
              text = text.replace(old_bottom, new_bottom)
              path.write_text(text, encoding='utf-8')

          about_path = root / 'about.html'
          about = about_path.read_text(encoding='utf-8')
          if 'class="section about-pathways"' not in about:
              marker = '<section class="section"><div class="container story-grid">'
              cards = '<section class="section about-pathways"><div class="container"><div class="section-heading centered"><p class="eyebrow">Explore Our Story</p><h2>Understand the heart behind Kingship.</h2><p>Go deeper into the vision, culture and testimonies shaping The Thrive Generation.</p></div><div class="value-grid"><article class="value-card"><span>01</span><h3>Vision &amp; Mission</h3><p>Discover what Kingship Christian Centre is called to build and the people we are called to serve.</p><a class="text-link" href="vision-mission.html">Read our vision →</a></article><article class="value-card"><span>02</span><h3>Our Culture</h3><p>Explore the convictions, values and spiritual atmosphere we are intentionally developing.</p><a class="text-link" href="culture.html">Explore our culture →</a></article><article class="value-card"><span>03</span><h3>Testimonies</h3><p>Read stories of faith, growth, restoration and the work God is doing through this community.</p><a class="text-link" href="testimonies.html">Read testimonies →</a></article></div></div></section>'
              if marker not in about:
                  raise SystemExit('About insertion point not found')
              about_path.write_text(about.replace(marker, cards + marker, 1), encoding='utf-8')

          media_path = root / 'media.html'
          media = media_path.read_text(encoding='utf-8')
          if 'class="section media-pathways"' not in media:
              marker = '<section class="section container">'
              pathway = '<section class="section media-pathways"><div class="container"><div class="section-heading"><p class="eyebrow">EXPLORE MEDIA</p><h2>Choose where you want to go.</h2><p>Browse the complete media library, sermon archive and visual gallery.</p></div><div class="media-pathway-grid"><a href="#media-library"><span>01</span><strong>Media Library</strong><small>Worship, ministry stories and highlights</small></a><a href="sermons.html"><span>02</span><strong>Sermons</strong><small>Teaching and messages from Kingship</small></a><a href="gallery.html"><span>03</span><strong>Gallery</strong><small>Photos from ministry, worship and community</small></a></div></div></section>'
              if marker not in media:
                  raise SystemExit('Media insertion point not found')
              media = media.replace(marker, pathway + '<section class="section container" id="media-library">', 1)
              media = media.replace('</head>', '<link href="assets/css/media-pathways.css" rel="stylesheet"/></head>', 1)
              media_path.write_text(media, encoding='utf-8')

          contact_path = root / 'contact.html'
          contact = contact_path.read_text(encoding='utf-8')
          if 'id="socials"' not in contact:
              target = '<div><h3>Official social media</h3>'
              if target not in contact:
                  raise SystemExit('Contact social section not found')
              contact_path.write_text(contact.replace(target, '<div id="socials"><h3>Official social media</h3>', 1), encoding='utf-8')

          footer_css = root / 'assets/css/site-footer.css'
          css = footer_css.read_text(encoding='utf-8')
          if '.footer-legal' not in css:
              css += '.kcc-global-footer .footer-bottom{align-items:center;flex-wrap:wrap}.kcc-global-footer .footer-legal{display:flex;align-items:center;gap:10px}.kcc-global-footer .footer-legal a{color:#aaa297}.kcc-global-footer .footer-legal a:hover{color:#fff}'
              footer_css.write_text(css, encoding='utf-8')

          (root / 'assets/css/media-pathways.css').write_text('.media-pathways{background:#f7f5f0}.media-pathway-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}.media-pathway-grid a{display:flex;flex-direction:column;min-height:220px;padding:28px;background:#fff;border:1px solid rgba(17,16,14,.12);color:#111;transition:transform .22s ease,box-shadow .22s ease,border-color .22s ease}.media-pathway-grid a:hover{transform:translateY(-5px);box-shadow:0 18px 45px rgba(20,17,13,.12);border-color:#d2aa5c}.media-pathway-grid span{color:#a77925;font-size:.72rem;font-weight:800;letter-spacing:.12em}.media-pathway-grid strong{font-family:var(--font-display);font-size:1.8rem;margin-top:auto}.media-pathway-grid small{color:#6f685f;margin-top:8px;line-height:1.5}@media(max-width:760px){.media-pathway-grid{grid-template-columns:1fr}.media-pathway-grid a{min-height:170px}}', encoding='utf-8')

      - name: Verify complete link graph
        shell: python
        run: |
          from pathlib import Path
          from html.parser import HTMLParser
          from urllib.parse import urlsplit, unquote

          root = Path('.')
          pages = {p.name: p for p in root.glob('*.html')}
          links = {name: [] for name in pages}
          anchors = {name: set() for name in pages}
          broken, missing = [], []

          class Parser(HTMLParser):
              def __init__(self):
                  super().__init__(); self.hrefs=[]; self.ids=set()
              def handle_starttag(self, tag, attrs):
                  attrs=dict(attrs)
                  if 'id' in attrs: self.ids.add(attrs['id'])
                  if tag == 'a' and 'href' in attrs: self.hrefs.append(attrs['href'])

          parsers = {}
          for name, path in pages.items():
              parser=Parser(); parser.feed(path.read_text(encoding='utf-8')); parsers[name]=parser; anchors[name]=parser.ids

          for name, parser in parsers.items():
              for href in parser.hrefs:
                  if not href: continue
                  if href.startswith('#'):
                      if href[1:] and href[1:] not in anchors[name]: missing.append((name,name,href[1:]))
                      continue
                  if href.startswith(('http://','https://','mailto:','tel:','javascript:')): continue
                  parsed=urlsplit(href); target=unquote(Path(parsed.path).name)
                  if not target.endswith('.html'): continue
                  if target not in pages: broken.append((name,href)); continue
                  links[name].append(target)
                  if parsed.fragment and parsed.fragment not in anchors[target]: missing.append((name,target,parsed.fragment))

          js='\n'.join(p.read_text(encoding='utf-8',errors='ignore') for p in root.rglob('*.js'))
          if 'event.html' in js: links['events.html'].append('event.html')
          if 'thrive-in-two-booking.html' in js: links['thrive-in-two.html'].append('thrive-in-two-booking.html')

          reachable=set(); stack=['index.html']
          while stack:
              page=stack.pop()
              if page in reachable: continue
              reachable.add(page); stack.extend(t for t in links.get(page,[]) if t not in reachable)

          orphaned=sorted(set(pages)-reachable-{'404.html'})
          inbound={name:set() for name in pages}
          for source, targets in links.items():
              for target in targets: inbound[target].add(source)
          weak={page:len(inbound[page]) for page in ('new-here.html','choir-members.html') if len(inbound[page]) < 2}

          print('HTML pages:', len(pages))
          print('Reachable from homepage:', len(reachable))
          print('Orphans:', orphaned)
          print('Broken links:', broken)
          print('Missing anchors:', missing)
          print('Weak routes:', weak)
          for page in ['culture.html','gallery.html','media.html','privacy-policy.html','sermons.html','terms.html','testimonies.html','vision-mission.html','new-here.html','choir-members.html']:
              print(page, len(inbound[page]))

          if orphaned or broken or missing or weak:
              raise SystemExit('Connectivity verification failed')
          print('CONNECTIVITY AUDIT PASSED')

      - name: Remove temporary files and commit
        shell: bash
        run: |
          rm -f .github/workflows/fix-site-connectivity.yml SITE-CONNECTIVITY-AUDIT.txt
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet && exit 0
          git commit -m "Connect all public website pages"
          git push origin HEAD:audit-page-connectivity

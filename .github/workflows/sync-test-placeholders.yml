name: Sync completed placeholder replacements

on:
  push:
    branches:
      - agent/sync-test-placeholder-removals
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Check out production staging branch
        uses: actions/checkout@v4
        with:
          ref: agent/sync-test-placeholder-removals
          fetch-depth: 0

      - name: Check out completed test repository
        uses: actions/checkout@v4
        with:
          repository: MandlaLee/test
          ref: main
          path: .source

      - name: Copy completed replacements safely
        shell: bash
        run: |
          rsync -a \
            --exclude='.git/' \
            --exclude='.github/' \
            --exclude='txt.txt' \
            --exclude='README.md' \
            .source/ ./
          rm -rf .source
          rm -f .github/workflows/sync-test-placeholders.yml

      - name: Commit synchronized files
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No differences found."
            exit 0
          fi
          git commit -m "Sync removed placeholders from test"
          git push origin HEAD:agent/sync-test-placeholder-removals
